name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '26'
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.6.1'
      - name: Backend tests
        working-directory: backend
        run: gradle clean test integrationTest bootJar

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '26'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        working-directory: frontend
        run: npm ci
      - name: Lint
        working-directory: frontend
        run: npm run lint
      - name: Typecheck
        working-directory: frontend
        run: npm run typecheck
      - name: Permission and workspace model tests
        working-directory: frontend
        run: npm run test:permissions
      - name: Build
        working-directory: frontend
        run: npm run build

  docker-config:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Docker compose config
        run: docker compose config

  docker-smoke:
    runs-on: ubuntu-latest
    needs: [backend, frontend, docker-config]
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - name: Docker Compose route smoke
        env:
          SMOKE_KEEP_RUNNING: '0'
        run: sh scripts/smoke-compose.sh
      - name: Keycloak OIDC smoke
        env:
          OIDC_SMOKE_KEEP_RUNNING: '0'
        run: sh scripts/smoke-oidc.sh
