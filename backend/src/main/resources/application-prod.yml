spring:
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI}

sia:
  security:
    production:
      enabled: true
      webhook-secret: ${SIA_PAYMENT_WEBHOOK_SECRET}
      issuer-uri: ${KEYCLOAK_ISSUER_URI}
      client-id: ${KEYCLOAK_CLIENT_ID:sia-pdam}
  payment:
    webhook:
      secret: ${SIA_PAYMENT_WEBHOOK_SECRET}
