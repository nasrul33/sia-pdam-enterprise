services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sia_pdam}
      POSTGRES_USER: ${POSTGRES_USER:-sia}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret}
    ports:
      - "${POSTGRES_PORT:-15432}:5432"
    volumes:
      - sia_pdam_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sia} -d ${POSTGRES_DB:-sia_pdam}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-16379}:6379"
    volumes:
      - sia_pdam_redisdata:/data

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "${MINIO_PORT:-19000}:9000"
      - "${MINIO_CONSOLE_PORT:-19001}:9001"
    volumes:
      - sia_pdam_miniodata:/data

  backend:
    build:
      context: ./backend
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-sia_pdam}
      DB_USER: ${POSTGRES_USER:-sia}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-secret}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MINIO_ENDPOINT: http://minio:9000
      SIA_BOOTSTRAP_ADMIN_USERNAME: ${SIA_BOOTSTRAP_ADMIN_USERNAME:-}
      SIA_BOOTSTRAP_ADMIN_EMAIL: ${SIA_BOOTSTRAP_ADMIN_EMAIL:-}
      SIA_BOOTSTRAP_ADMIN_PASSWORD: ${SIA_BOOTSTRAP_ADMIN_PASSWORD:-}
    ports:
      - "${BACKEND_PORT:-18080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:18080}
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:18080}
    ports:
      - "${FRONTEND_PORT:-13000}:3000"
    depends_on:
      - backend

volumes:
  sia_pdam_pgdata:
  sia_pdam_redisdata:
  sia_pdam_miniodata:
